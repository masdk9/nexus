<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Homepage</title>
    <style>
        /* CSS styling */
        body {
            font-family: sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to Nexus</h1>
        <p>Yeh hamara simple homepage hai, bina kisi external file ke.</p>
        <button onclick="showMessage()">Click Me</button>
    </div>

    <script>
        // JavaScript logic
        function showMessage() {
            alert("Nexus is running successfully!");
        }
    </script>
</body>
</html>
